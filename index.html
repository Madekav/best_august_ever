<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown</title>

<script src="https://cdn.tailwindcss.com"></script>



<style>



body{
    background:linear-gradient(135deg,#eef2ff,#fdf2f8,#ecfeff);
    overflow:hidden;
}

.fade{
    animation:fade .7s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.98);}
to{opacity:1;transform:scale(1);}
}

.float{
position:absolute;
opacity:.18;
animation:float 10s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-30px);}
}

.card{
backdrop-filter:blur(20px);
background:rgba(255,255,255,.75);
border:1px solid rgba(255,255,255,.6);
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.number{
font-size:3rem;
font-weight:700;
line-height:1;
}

@media(min-width:768px){
.number{
font-size:5rem;
}
}


.envelope{

position:absolute;
width:160px;
height:160px;

background:white;

border-radius:20px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 12px 30px rgba(0,0,0,.12);

transition:.3s;

animation:float 7s ease-in-out infinite;

font-size:26px;

}

.envelope:hover{

transform:translateX(-50%) scale(1.12) rotate(4deg);

}

.envelope span{

font-weight:bold;

font-size:18px;

margin-top:3px;

}

.e1{
    top:-110px;
    left:-180px;
}

.e2{
    top:-110px;
    right:-180px;
}

.e3{
    top:80px;
    left:-170px;
}

.e4{
    top:80px;
    right:-170px;
}

.e5{
    top:300px;
    left:-170px;
}

.e6{
    top:300px;
    right:-170px;
}

.e7{
    bottom:-190px;
    left:50%;
    transform:translateX(-50%);
}

.e1 { animation-delay:0s; }
.e2 { animation-delay:.8s; }
.e3 { animation-delay:1.5s; }
.e4 { animation-delay:2.2s; }
.e5 { animation-delay:3s; }
.e6 { animation-delay:3.8s; }
.e7 { animation-delay:4.5s; }

</style>

</head>

<body class="h-screen flex items-center justify-center">
<div id="loginDecorations">
<div class="float top-8 left-10">
    <img src="images/smile.png" class="w-24 h-24">
</div>

<div class="float bottom-10 right-10" style="animation-delay:2s;">
    <img src="images/honeybee.png" class="w-24 h-24">
</div>

<div class="float top-24 right-20" style="animation-delay:4s;">
    <img src="images/monkey.png" class="w-24 h-24">
</div>

<div class="float bottom-24 left-20" style="animation-delay:1s;">
    <img src="images/tongue.png" class="w-24 h-24">
</div>

<div class="float left-1/2 top-12" style="animation-delay:3s;">
    <img src="images/vampire.png" class="w-24 h-24">
</div>
</div>

<!-- LOGIN -->

<div id="loginScreen" class="fade w-full max-w-md p-8">

<div class="card rounded-3xl p-8">

<h1 class="text-4xl font-bold text-center mb-2">
🔐
</h1>

<h2 class="text-2xl font-bold text-center">
Welcome
</h2>

<p class="text-center text-gray-500 mb-8">
Enter credentials to continue
</p>

<input
id="username"
type="text"
placeholder="Who are you?"
class="w-full p-3 rounded-xl border mb-4 outline-none focus:ring-2 focus:ring-indigo-400">

<input
id="password"
type="password"
placeholder="DD/MM/YYYY"
class="w-full p-3 rounded-xl border mb-6 outline-none focus:ring-2 focus:ring-indigo-400">

<button
onclick="login()"
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl py-3 font-semibold transition">
Login
</button>

<p id="error" class="text-red-500 text-center mt-4 hidden">
Incorrect credentials
</p>

</div>

</div>

<!-- COUNTDOWN -->

<div id="countdownScreen" class="hidden fade relative w-screen h-screen items-center justify-center">
<div class="relative card rounded-3xl px-20 py-14 text-center max-w-5xl">

<div class="envelope e1" onclick="openLetter(1)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">1</div></div>
<div class="envelope e2" onclick="openLetter(2)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">2</div></div>
<div class="envelope e3" onclick="openLetter(3)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">3</div></div>
<div class="envelope e4" onclick="openLetter(4)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">4</div></div>
<div class="envelope e5" onclick="openLetter(5)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">5</div></div>
<div class="envelope e6" onclick="openLetter(6)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">6</div></div>
<div class="envelope e7" onclick="openLetter(7)"><img src="images/letter.png" class="w-32">
    <div class="absolute font-bold text-lg">7</div></div>

<h1 class="text-4xl md:text-5xl font-bold mb-3">
🎯 Countdown
</h1>

<p class="text-gray-500 mb-10">
Until August 1, 2026
</p>

<div class="grid grid-cols-2 md:grid-cols-4 gap-6">

<div>
<div id="days" class="number text-indigo-600">0</div>
<div class="uppercase text-gray-500 tracking-widest">Days</div>
</div>

<div>
<div id="hours" class="number text-pink-600">0</div>
<div class="uppercase text-gray-500 tracking-widest">Hours</div>
</div>

<div>
<div id="minutes" class="number text-cyan-600">0</div>
<div class="uppercase text-gray-500 tracking-widest">Minutes</div>
</div>

<div>
<div id="seconds" class="number text-emerald-600">0</div>
<div class="uppercase text-gray-500 tracking-widest">Seconds</div>
</div>

</div>

<div class="mt-10 text-gray-400 text-sm">
✨ Every second brings us closer ✨
</div>

</div>

</div>

<div id="letterModal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

<div class="card rounded-3xl p-8 w-[90%] max-w-lg">

<h2 id="letterTitle"
class="text-3xl font-bold mb-6">
Letter
</h2>

<p id="letterText"
class="text-lg leading-8 text-gray-700">
...
</p>

<button
onclick="closeLetter()"
class="mt-8 w-full bg-indigo-600 text-white rounded-xl py-3">

Close

</button>

</div>

</div>

<script>

const USERNAME="Nicole";
const PASSWORD="10/06/2026";

function login(){

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

if(user===USERNAME && pass===PASSWORD){

document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("loginDecorations").classList.add("hidden");
const countdown = document.getElementById("countdownScreen");
countdown.classList.remove("hidden");
countdown.classList.add("flex");

updateCountdown();
setInterval(updateCountdown,1000);

}else{

document.getElementById("error").classList.remove("hidden");

}

}

document.getElementById("password").addEventListener("keypress",function(e){
if(e.key==="Enter") login();
});

const letters=[

"The best flight ever",

"The salty rocks",

"The most incredible football match",

"The sushi pops",

"The best Subway sandwich ever",

"Your cute white vest from Paris",

"The two poor little ducks"

];

const dates = [
  "10 June 2026",
  "13 June 2026",
  "16 June 2026",
  "18 June 2026",
  "23 June 2026",
  "24 June 2026",
  "25 June 2026"
];

function openLetter(n){

document.getElementById("letterTitle").textContent = dates[n - 1];

document.getElementById("letterText").textContent=letters[n-1];

document.getElementById("letterModal").classList.remove("hidden");

}

function closeLetter(){

document.getElementById("letterModal").classList.add("hidden");

}

function updateCountdown(){

// July 30, 2026 at 18:30 in Central European Time (UTC+2)
// Note: This uses a fixed UTC timestamp corresponding to 2026-07-30T16:30:00Z.

const target = new Date("2026-07-30T16:30:00Z").getTime();

const now = new Date().getTime();

const diff=target-now;

if(diff<=0){

document.getElementById("days").textContent=0;
document.getElementById("hours").textContent=0;
document.getElementById("minutes").textContent=0;
document.getElementById("seconds").textContent=0;

return;

}

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("days").textContent=days;
document.getElementById("hours").textContent=String(hours).padStart(2,"0");
document.getElementById("minutes").textContent=String(minutes).padStart(2,"0");
document.getElementById("seconds").textContent=String(seconds).padStart(2,"0");

}

</script>

</body>
</html>
